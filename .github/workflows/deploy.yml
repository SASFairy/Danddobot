name: Deploy Danddobot to Server

on:
  push:
    branches:
      - main
      - dev
      - 'feature/*'

jobs:
  deploy:
    name: Remote Deployment via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Execute deployment commands on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🚀 Starting Dynamic Deployment of Danddobot..."
            
            # Navigate to the configured project path on your server
            cd "${{ secrets.PROJECT_PATH }}" || { echo "❌ Directory not found!"; exit 1; }
            
            # Fetch and dynamically checkout the branch that triggered this deployment
            echo "📥 Fetching latest code for branch: ${{ github.ref_name }}..."
            sudo git fetch origin
            sudo git checkout ${{ github.ref_name }}
            sudo git pull origin ${{ github.ref_name }}
            
            # Rebuild and start Docker containers in background
            echo "🐳 Rebuilding and spinning up Docker containers..."
            sudo docker compose up --build -d
            
            echo "✅ Deployment completed successfully!"
